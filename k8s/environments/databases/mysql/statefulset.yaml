apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mysql-statefulset
  labels:
    env: production
    tier: database
    app: mysql
    name: mysql-statefulset
spec:
  serviceName: mysql
  replicas: 1
  selector:
    matchLabels:
      env: production
      tier: database
      app: mysql
      name: mysql-pod
  template:
    metadata:
      labels:
        env: production
        tier: database
        app: mysql
        name: mysql-pod
    spec:
      initContainers:
        - name: init-mysql
          image: mysql:5.7
          command:
            - bash
            - "-c"
            - |
              set -ex
              [[ $HOSTNAME =~ -([0-9]+)$ ]] || exit 1
              ordinal=${BASH_REMATCH[1]}
              echo [mysqld] > /mnt/conf.d/server-id.cnf
              echo server-id=$((100 + $ordinal)) >> /mnt/conf.d/server-id.cnf
              if [[ $ordinal -eq 0 ]]; then
                cp /mnt/mysql-configmap/master.cnf /mnt/conf.d/
              else
                cp /mnt/mysql-configmap/slave.cnf /mnt/conf.d/
              fi
          volumeMounts:
            - name: mysql-conf
              mountPath: /mnt/conf.d
            - name: mysql-configmap
              mountPath: /mnt/mysql-configmap
      containers:
        - name: mysql
          image: mysql:5.7
          env:
          - name: MYSQL_USER
            valueFrom:
              configMapKeyRef:
                key: mysql-user
                name: mysql-configmap
          - name: MYSQL_DATABASE
            valueFrom:
              configMapKeyRef:
                key: mysql-database
                name: mysql-configmap
          - name: MYSQL_PASSWORD
            valueFrom:
              secretKeyRef:
                key: mysql-password
                name: mysql-secret
          - name: MYSQL_ALLOW_EMPTY_PASSWORD
            valueFrom:
              configMapKeyRef:
                key: mysql-allow-empty-password
                name: mysql-configmap
          - name: MYSQL_ROOT_HOST
            valueFrom:
              configMapKeyRef:
                key: mysql-root-host
                name: mysql-configmap
          ports:
            - name: mysql
              containerPort: 3306
          volumeMounts:
            - name: mysql-data
              mountPath: /var/lib/mysql
              subPath: mysql
            - name: mysql-conf
              mountPath: /etc/mysql/conf.d
          startupProbe:
            exec:
              command: ["mysqladmin", "ping"]
            initialDelaySeconds: 10
            periodSeconds: 2
            timeoutSeconds: 1
          readinessProbe:
            exec:
              command: ["mysql", "-h", "127.0.0.1", "-e", "SELECT 1"]
            initialDelaySeconds: 30
            periodSeconds: 2
            timeoutSeconds: 1
      volumes:
        - name: mysql-conf
          emptyDir: {}
        - name: mysql-configmap
          configMap:
            name: mysql-configmap
        - name: mysql-data
          persistentVolumeClaim:
            claimName: mysql-pvc
